<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Задача 1</title>
    <link rel="stylesheet" href="../lesson_5/css/task-style.css" />
  </head>
  <body>
    <div class="page">
      <a href="../index.html" class="back">← Назад</a>

      <div class="card">
        <h1>Задача 2</h1>

        <p class="description">
          Інвестор вклав S тис. грн на 20 років під 20% річних. Визначити за
          допомогою циклів суму, яку він одержить (без оподаткування).
        </p>
      </div>
    </div>

    <script>
      let text = prompt("Введіть початкову суму", "1000");
      // вводити з пробілами можна
      let money = parseFloat(text.replaceAll(" ", ""));

      for (let year = 1; year <= 20; year++) {
        money += money * 0.2;
      }

      document.write(`Сума через 20 років: ${money.toFixed(2)} грн`);
    </script>
  </body>
</html>
