<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Задача 1</title>
    <link rel="stylesheet" href="../lesson_5/css/task-style.css" />
  </head>
  <body>
    <div class="page">
      <a href="../index.html" class="back">← Назад</a>

      <div class="card">
        <h1>Задача 1</h1>

        <p class="description">
          Вивести на екран усі двоцифрові числа, у яких перша цифра є більшою
          або рівною за другу.
        </p>
      </div>
    </div>

    <script>
      for (let num = 10; num <= 99; num++) {
        let first = Math.floor(num / 10);
        let second = num % 10;

        if (first >= second) {
          document.write(num + "<br>");
        }
      }
    </script>
  </body>
</html>
