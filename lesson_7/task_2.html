<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Задача 2</title>
    <link rel="stylesheet" href="../lesson_5/css/task-style.css" />
  </head>
  <body>
    <div class="page">
      <a href="../index.html" class="back">← Назад</a>

      <div class="card">
        <h1>Задача 2</h1>

        <p class="description">
          Створити функцію, яка за номером дня дозволяє з’ясувати чи є цей день
          робочим.
        </p>
      </div>
    </div>

    <script>
      function isWorkingDay(dayNumber) {
        let result;

        switch (dayNumber) {
          case 1:
          case 2:
          case 3:
          case 4:
          case 5:
            result = "Робочий день";
            break;

          case 6:
          case 7:
            result = "Вихідний";
            break;

          default:
            result = "Невірний номер дня";
        }

        return result;
      }

      let dayNumber = parseInt(prompt("Введіть номер дня (1-7)"));
      let res = isWorkingDay(dayNumber);

      document.write(`Результат: ${res}`);
    </script>
  </body>
</html>
