<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Задача 0</title>
    <link rel="stylesheet" href="../lesson_5/css/task-style.css" />
  </head>
  <body>
    <div class="page">
      <a href="../index.html" class="back">← Назад</a>

      <div class="card">
        <h1>Задача 0</h1>

        <p class="description">
          Створити функцію, яка за номером місяця повертає пору року, до якої
          відноситься цей місяць.
        </p>
      </div>
    </div>

    <script>
      function getSeason(monthNumber) {
        // --- знаходимо результат
        let season;

        switch (monthNumber) {
          case 12:
          case 1:
          case 2:
            season = "Зима";
            break;

          case 3:
          case 4:
          case 5:
            season = "Весна";
            break;

          case 6:
          case 7:
          case 8:
            season = "Літо";
            break;

          case 9:
          case 10:
          case 11:
            season = "Осінь";
            break;

          default:
            season = "Невірний номер місяця";
        }

        // --- повертаємо результат
        return season;
      }

      // перевірка
      let month = parseInt(prompt("Введіть номер місяця (1-12)"));
      let result = getSeason(month);

      document.write(`Пора року: ${result}`);
    </script>
  </body>
</html>
