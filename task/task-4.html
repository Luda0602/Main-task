<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Задача 4</title>
  </head>
  <body>
    <h1>Задача 4.</h1>
    <p>Дано довжину у сантиметрах. Визначати скільки це метрів і кілометрів.</p>
    <script>
      let lengthCm = parseFloat(prompt("Введіть довжину в сантиметрах"));
      //   перет. в метри та кілометри
      let lengthM = lengthCm / 100;
      let lengthKm = lengthCm / 100000;

      // Результат
      document.write(`<p>${lengthCm} см = ${lengthM}м = ${lengthKm}км </p>`);
    </script>
  </body>
</html>
