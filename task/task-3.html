<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Задача 3</title>
  </head>
  <body>
    <h1>Задача 3.</h1>
    <p>
      Дано вартість одиниці товару і кількість. Знайти загальну вартість та ПДВ
      (5% від загальної вартості).
    </p>
    <script>
      let price = parseFloat(prompt('Введіть вартість товару', 0));
      let quantity = parseFloat(prompt('Введіть кількість товару', 0));
      let vat = 0.05;
      // Результат
      let total = price * quantity;
      let vatAmount = total * 0.05;

      document.write(
        `<p>Вартість товару: ${total} грн,<br> ПДВ становить: ${vatAmount} грн</p>`,
      );
    </script>
  </body>
</html>
