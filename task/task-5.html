<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <link rel="stylesheet" href="../css/styles.css"
    <title>Задача 5.</title>
  </head>
  <body>
    <h1>Задача 5.</h1>
    <p>
      Дано кількість секунд, що пройшла від початку доби. Визначити скільки це
      годин і хвилин.
    </p>
    <script>
      let totalSeconds = parseInt(prompt('Введіть кількість секунд', 0));
      let secondsPerMinute = 60;
      let secondsPerHour = 3600;
      //   Результат
      let minutes = Math.floor(totalSeconds / secondsPerMinute);
      let hours = Math.floor(totalSeconds / secondsPerHour);

      document.write(
        `<p>${totalSeconds} секунд - ${minutes}хв та ${hours} год.</p>`,
      );
    </script>
  </body>
</html>
