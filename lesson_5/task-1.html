<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Задача 1</title>
    <link rel="stylesheet" href="/lesson_5/css/task-style.css" />
  </head>
  <body>
    <div class="page">
      <a href="../index.html" class="back">← Назад</a>

      <div class="card">
        <h1>Задача 1</h1>

        <p class="description">
          Поступово генерувати 100 випадкових чисел від 1 до 1000. Підрахувати
          яких чисел більше: парних чи непарних.
        </p>
      </div>
    </div>

    <script>
      if (confirm("Почати тестування?")) {
        let evenNumbers = 0;
        let oddNumbers = 0;
        for (let i = 0; i < 100; i++) {
          let randomNumbers = Math.floor(Math.random() * 1000) + 1;
          document.write(`${randomNumbers} <br>`);
          if (randomNumbers % 2 === 0) {
            evenNumbers++;
          } else {
            oddNumbers++;
          }
        }
        if (evenNumbers > oddNumbers) {
          document.write(`Парних чисел більше : ${evenNumbers}`);
        } else if (evenNumbers < oddNumbers) {
          document.write(`Непарних чисел більше : ${oddNumbers}`);
        } else {
          document.write(`Однакова кількість парних та непарних чисел`);
        }
      }
    </script>
  </body>
</html>
