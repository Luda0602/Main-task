<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Задача 4</title>
    <link rel="stylesheet" href="/lesson_5/css/task-style.css" />
  </head>
  <body>
    <div class="page">
      <a href="../index.html" class="back">← Назад</a>

      <div class="card">
        <h1>Задача 4</h1>

        <p class="description">
          Вивести з використанням циклів маркований список з випадковими числами
          (1-100). Кількість випадкових чисел вводиться користувачем.
        </p>
      </div>
    </div>

    <script>
      if (confirm("Почати тестування?")) {
        let count = parseInt(prompt("Введіть кількість чисел:"));
        let i = 0;
        document.write("<ul>");

        while (i < count) {
          let randomNumbers = Math.floor(Math.random() * 100) + 1;
          document.write(`<li>${randomNumbers}</li>`);
          i++;
        }
        document.write("</ul>");
      }
    </script>
  </body>
</html>
