<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Задача 5</title>
    <link rel="stylesheet" href="./css/task-style.css" />
  </head>
  <body>
    <div class="page">
      <a href="../index.html" class="back">← Назад</a>

      <div class="card">
        <h1>Задача 5</h1>

        <p class="description">
          Створити 10 елементів для введення цін продуктів
        </p>
      </div>
    </div>

    <script>
      if (confirm("Почати тестування?")) {
        document.write("<table>");

        for (let i = 1; i <= 10; i++) {
          document.write("<tr>");

          document.write(`<td>Product # ${i}</td>`);
          document.write("<td><input type='text'></td>");

          document.write("</tr>");
        }

        document.write("</table>");
      }
    </script>
  </body>
</html>
